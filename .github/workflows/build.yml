name: Android Module Build CI

# 触发条件：当有人推送到 main 分支，或者手动点击运行时触发
on:
  push:
    branches: [ "main" ] # 如果你的主分支叫 master，请改为 "master"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # 允许在网页端手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 服务器环境

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Java 环境 (Magisk模块通常需要 JDK 11 或 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. 赋予 gradlew 执行权限 (防止报错 Permission denied)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 执行编译 (完全照搬你截图中的命令)
      - name: Build with Gradle
        run: ./gradlew :module:assembleRelease

      # 5. 查找生成的 ZIP 文件
      # 截图提示文件在 out 文件夹下，这里用 find 命令把它找出来
      - name: Find Artifact
        id: find_zip
        run: |
          ZIP_PATH=$(find . -path "*/out/*.zip" | head -n 1)
          echo "Found zip at: $ZIP_PATH"
          echo "zip_path=$ZIP_PATH" >> $GITHUB_OUTPUT

      # 6. 上传编译好的 ZIP 包到 GitHub Actions 页面供下载
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Magisk-Module-Zip
          path: ${{ steps.find_zip.outputs.zip_path }}
          if-no-files-found: error
