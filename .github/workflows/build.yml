name: Android Module Build CI


on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest 

    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle


      - name: Grant execute permission for gradlew
        run: chmod +x gradlew


      - name: Build with Gradle
        run: ./gradlew :module:assembleRelease


      - name: Find Artifact
        id: find_zip
        run: |
          ZIP_PATH=$(find . -path "*/out/*.zip" | head -n 1)
          echo "Found zip at: $ZIP_PATH"
          echo "zip_path=$ZIP_PATH" >> $GITHUB_OUTPUT


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Magisk-Module-Zip
          path: ${{ steps.find_zip.outputs.zip_path }}
          if-no-files-found: error
